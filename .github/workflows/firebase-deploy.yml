name: Deploy to Firebase

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firebase.json'
      - 'firestore.rules'
      - 'src/**'
      - 'index.html'
      - 'vite.config.js'
      - '.github/workflows/firebase-deploy.yml'

jobs:
  # 部署前先跑測試與 lint — 任一失敗就不部署
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Engine tests import functions/src modules (resolve from functions/node_modules)
      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Run unit tests
        run: npm test

      - name: Lint functions
        run: npm run lint
        working-directory: functions

  deploy-functions:
    runs-on: ubuntu-latest
    needs: test
    # 【關鍵修改 1】加入權限設定，允許與 Google 換證
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'          
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions Dependencies
        run: |
          cd functions
          npm ci
      
      # 【關鍵修改 2】Google 身分驗證 (WIF)
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          # 我們刚刚建立成功的 Provider ID
          workload_identity_provider: 'projects/825053137358/locations/global/workloadIdentityPools/github-actions/providers/github-final'
          # 你的 Service Account
          service_account: 'firebase-adminsdk-fbsvc@poker-ledger-a0e06.iam.gserviceaccount.com'

      # 【關鍵修改 3】安裝 Firebase 工具並部署
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 將 GitHub Secrets 寫入 functions/.env，部署時隨 Functions 上傳。
      # POKER_TASKS_SECRET 用於 Cloud Tasks HMAC 簽章驗證；未設定該
      # GitHub Secret 時不寫入，Functions 會跳過驗證（向後相容）。
      - name: Write functions runtime env
        run: |
          touch functions/.env
          if [ -n "$POKER_TASKS_SECRET" ]; then
            echo "POKER_TASKS_SECRET=$POKER_TASKS_SECRET" >> functions/.env
          fi
        env:
          POKER_TASKS_SECRET: ${{ secrets.POKER_TASKS_SECRET }}

      - name: Deploy to Firebase Functions
        run: firebase deploy --only functions --force --project poker-ledger-a0e06

  deploy-hosting:
    runs-on: ubuntu-latest
    needs: test
    # 【關鍵修改 1】這裡也要加權限
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'          
          cache-dependency-path: package-lock.json
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      # 【關鍵修改 2】Google 身分驗證 (Hosting 也要做一次)
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/825053137358/locations/global/workloadIdentityPools/github-actions/providers/github-final'
          service_account: 'firebase-adminsdk-fbsvc@poker-ledger-a0e06.iam.gserviceaccount.com'

      # 【關鍵修改 3】安裝工具並部署
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project poker-ledger-a0e06
