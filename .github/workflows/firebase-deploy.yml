name: Deploy to Firebase

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firebase.json'
      - 'firestore.rules'
      - 'src/**'
      - 'index.html'
      - 'vite.config.js'
      - '.github/workflows/firebase-deploy.yml'

jobs:
  # 部署前先跑測試與 lint — 任一失敗就不部署
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Engine tests import functions/src modules (resolve from functions/node_modules)
      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Run unit tests
        run: npm test

      - name: Lint functions
        run: npm run lint
        working-directory: functions

  # ci.yml 只跑 PR / 非 main push——直推 main 時 rules 測試會被跳過，
  # 所以部署前在這裡再跑一次 emulator rules 測試。
  firestore-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Setup Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run Firestore rules tests
        run: npm run test:rules

  deploy-functions:
    runs-on: ubuntu-latest
    needs: [test, firestore-rules]
    # 【關鍵修改 1】加入權限設定，允許與 Google 換證
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'          
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions Dependencies
        run: |
          cd functions
          npm ci
      
      # Google 身分驗證：用 Service Account 金鑰（firebase-tools 完整支援，
      # 比 WIF 的 external_account 憑證可靠）。auth action 會把金鑰寫成檔案並
      # 設定 GOOGLE_APPLICATION_CREDENTIALS，firebase deploy 直接吃。
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'

      # 【關鍵修改 3】安裝 Firebase 工具並部署
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 將 GitHub Secrets 寫入 functions/.env，部署時隨 Functions 上傳。
      # POKER_TASKS_SECRET 用於 Cloud Tasks HMAC 簽章驗證；未設定該
      # GitHub Secret 時不寫入，Functions 會跳過驗證（向後相容）。
      - name: Write functions runtime env
        run: |
          touch functions/.env
          if [ -n "$POKER_TASKS_SECRET" ]; then
            echo "POKER_TASKS_SECRET=$POKER_TASKS_SECRET" >> functions/.env
          fi
        env:
          POKER_TASKS_SECRET: ${{ secrets.POKER_TASKS_SECRET }}

      # rules/indexes 一併部署：production 與 repo 已於 2026-07-20 人工比對並
      # 同步（TODO P0「rules 自動部署」前置條件解除）。emulator rules 測試在
      # 部署前的 test job 把關。
      - name: Deploy to Firebase Functions + Firestore rules/indexes
        run: firebase deploy --only functions,firestore --force --project poker-ledger-a0e06

  # 前端部署在 GitHub Pages（deploy.yml，base: '/poker-ledger/'），不是 Firebase
  # Hosting，所以這裡不再部 hosting，避免「current active version」重複發版錯誤。
